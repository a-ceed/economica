#sh{position:absolute;top:-4px;height:12px;border-radius:6px;
  background:linear-gradient(90deg,#a07020,#e8c96a);
  cursor:grab;min-width:14px;box-shadow:0 0 8px rgba(232,201,106,.5)}
#sh:active{cursor:grabbing}
#tk{position:relative;height:14px;margin-bottom:7px}
.tk{position:absolute;font-size:8px;color:rgba(200,168,75,.45);

.tk.mj{color:rgba(232,201,106,.85);font-size:9px;font-weight:600}
#bn{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.bt{background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.2);

.bt:hover{background:rgba(200,168,75,.18);border-color:rgba(200,168,75,.5)}
.bt.on{background:rgba(200,168,75,.22);border-color:#c8a84b;color:#fff}
#fl{position:absolute;left:18px;top:66px;

.fl{display:flex;align-items:center;gap:6px;background:rgba(2,3,10,.82);

  color:rgba(240,234,216,.55);transition:.12s}
.fl:hover,.fl.on{color:#fff;border-color:rgba(255,255,255,.2)}
.fd{width:10px;height:10px;border-radius:50%}
.fn{margin-left:auto;font-size:10px;color:rgba(240,234,216,.22)}
#sw{position:absolute;right:18px;top:66px;width:280px;pointer-events:auto;
  display:flex;flex-direction:column;gap:6px;
  max-height:calc(100vh - 160px);overflow-y:auto;padding-right:2px}
.swb{position:relative}
.swb label{display:block;font-size:11px;color:rgba(200,168,75,.5);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.si{width:100%;background:rgba(2,3,10,.88);border:1px solid rgba(200,168,75,.2);

.si:focus{border-color:rgba(200,168,75,.5)}
.si::placeholder{color:rgba(240,234,216,.18)}
.si.active{border-color:#e8c96a;box-shadow:0 0 8px rgba(232,201,106,.3)}
.sl{margin-top:2px;background:rgba(2,3,10,.98);border:1px solid rgba(200,168,75,.1);
  border-radius:4px;max-height:160px;overflow-y:auto;display:none;
  position:absolute;z-index:50;width:100%;left:0}
.sl.op{display:block}
.sr{padding:5px 9px;font-size:10px;cursor:pointer;
  color:rgba(240,234,216,.6);border-bottom:1px solid rgba(255,255,255,.04)}
.sr:hover{background:rgba(200,168,75,.1);color:#fff}
.sr small{font-size:8px;color:rgba(200,168,75,.38);margin-left:4px}
.clr{position:absolute;right:7px;top:50%;transform:translateY(-50%);
  color:rgba(200,168,75,.5);cursor:pointer;font-size:14px;line-height:1;
  display:none}
.clr.on{display:block}

#tip{position:fixed;background:rgba(2,3,10,.97);border:1.5px solid rgba(200,168,75,.5);

#tip .ds{font-size:14px;color:rgba(240,234,216,.55);margin-top:7px;line-height:1.65}

// ---------- Текстура с именем ----------
// Холст рисуется в 4× больше физического размера плашки в пикселях.
// Это даёт чёткий subpixel-текст даже вблизи.
// Текстура кладётся на грани +Z и -Z (индексы 4 и 5).
// При mesh.rotation.x = -angle грань +Z смотрит наружу от оси → к зрителю.

var PX=55;   // пикс / Three.js unit
var SUP=2;   // суперсемплинг (2=баланс чёткость/память)

function makeTex(name,hex,bW,bH){
  var cw=Math.max(Math.ceil(bW*PX*SUP),128);
  var ch=Math.max(Math.ceil(bH*PX*SUP),64);
  var cv=document.createElement('canvas');
  cv.width=cw; cv.height=ch;
  var ctx=cv.getContext('2d');

  // фон
  ctx.fillStyle='rgba(3,4,14,0.88)';
  ctx.fillRect(0,0,cw,ch);

  // рамка цвета категории
  ctx.strokeStyle=hex;
  ctx.lineWidth=2.5*SUP;
  ctx.strokeRect(SUP,SUP,cw-2*SUP,ch-2*SUP);

  // авторазмер шрифта — занимаем почти всю ширину плашки
  var maxW=cw-2*SUP;
  var fs=42*SUP;
  ctx.font='700 '+fs+'px Arial,sans-serif';
  while(fs>7*SUP && ctx.measureText(name).width>maxW){
    fs-=SUP;
    ctx.font='700 '+fs+'px Arial,sans-serif';
  }

  // тень + текст
  ctx.shadowColor='rgba(0,0,0,0.95)';
  ctx.shadowBlur=4*SUP;
  ctx.fillStyle=hex;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(name,cw/2,ch/2);
  ctx.shadowBlur=0;

  var tex=new THREE.CanvasTexture(cv);
  tex.minFilter=THREE.LinearMipmapLinearFilter;
  tex.magFilter=THREE.LinearFilter;
  tex.generateMipmaps=true;
  tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
  return tex;
}

// ---------- Коллизии: track × layer ----------
// NT угловых дорожек, NL радиальных слоёв.
// Каждая ячейка (track,layer) хранит список занятых [xS,xE].
// Для новой плашки: round-robin по дорожкам, для каждой дорожки
// ищем свободный слой (от ближнего к дальнему).
// Если нет свободных — берём дорожку с минимальным перекрытием.

// ── Коллизии: 2D упаковка (ось времени X + угол θ) ──────────────
// Все плашки на одном радиусе R_FIXED.
// Новая плашка ищет угол θ такой, что нет пересечения ни с одной
// уже размещённой плашкой по ОБЕИМ осям одновременно.
// ANG_HALF = половина угловой ширины плашки (в радианах).
// Шаг перебора углов = ANG_HALF*2 + небольшой запас.
var R_FIXED = 65;
var XGAP    = 0.35;
var BH      = 1.4;   // высота плашки — нужна для расчёта ANG_HALF
var ANG_HALF = Math.asin((BH/2 + 0.12) / R_FIXED);  // ~2.7 deg
var ANG_STEP = ANG_HALF * 2.2;  // шаг между дорожками
var N_SLOTS  = Math.ceil(Math.PI * 2 / ANG_STEP);    // ~74 дорожки

var placed = [];  // {xS, xE, angle}
var rrSlot = 0;   // round-robin стартовый слот

function angDiff(a, b) {
  // минимальная угловая разница на окружности [-π, π]
  var d = ((a - b) % (Math.PI*2) + Math.PI*3) % (Math.PI*2) - Math.PI;
  return Math.abs(d);
}

function assign(xS, xE) {
  // Сортируем слоты: сначала ближайшие к зрителю (angle≈0, pz=+R)
  var _order=[];
  for(var _i=0;_i<N_SLOTS;_i++) _order.push(_i);
  _order.sort(function(a,b){
    var aa=((rrSlot+a)%N_SLOTS)*ANG_STEP;
    var ab=((rrSlot+b)%N_SLOTS)*ANG_STEP;
    if(aa>Math.PI) aa-=Math.PI*2;
    if(ab>Math.PI) ab-=Math.PI*2;
    return Math.abs(aa)-Math.abs(ab);
  });
  for (var di = 0; di < N_SLOTS; di++) {
    var slot  = (rrSlot + _order[di]) % N_SLOTS;
    var angle = slot * ANG_STEP;
    // Проверяем конфликт со всеми уже размещёнными
    var conflict = false;
    for (var k = 0; k < placed.length; k++) {
      var p = placed[k];
      var overlapX = (p.xE + XGAP > xS) && (p.xS - XGAP < xE);
      var overlapA = angDiff(p.angle, angle) < ANG_HALF * 2;
      if (overlapX && overlapA) { conflict = true; break; }
    }
    if (!conflict) {
      placed.push({xS:xS, xE:xE, angle:angle});
      rrSlot = (slot + 1) % N_SLOTS;
      return angle;
    }
  }
  // fallback: берём угол с минимальным суммарным перекрытием
  var bestAngle = rrSlot * ANG_STEP, minScore = 1e9;
  for (var di2 = 0; di2 < N_SLOTS; di2++) {
    var ang2  = di2 * ANG_STEP;
    var score = 0;
    for (var k2 = 0; k2 < placed.length; k2++) {
      var p2 = placed[k2];
      var ox = Math.max(0, Math.min(p2.xE,xE) - Math.max(p2.xS,xS));
      var oa = Math.max(0, ANG_HALF*2 - angDiff(p2.angle, ang2));
      score += ox * oa;
    }
    if (score < minScore) { minScore = score; bestAngle = ang2; }
  }
  placed.push({xS:xS, xE:xE, angle:bestAngle});
  return bestAngle;
}

// ---------- Барабан ----------
function initDrum(){
var drum=new THREE.Group();
scene.add(drum);

// BH определён выше в блоке коллизий
var BD=0.22;  // толщина плашки

var allMeshes=[];
var visCat={};
CK.forEach(function(c){visCat[c]=true;});

// измеритель ширины текста
var mc=document.createElement('canvas'),mx=mc.getContext('2d');
mc.width=512; mx.font='700 13px Arial,sans-serif';

PEOPLE.forEach(function(p){
  var name=p[0],born=p[1],died=p[2],cat=p[3],desc=p[4],fullname=p[5]||p[0];
  if(!CATS[cat]) return;

  var xS=x4y(Math.max(born,YMN));
  var xE=x4y(Math.min(died,YMX));
  var col=new THREE.Color(CATS[cat].c);
  var hex='#'+col.getHexString();

  // ширина плашки
  var nw=(mx.measureText(name).width+20)/(PX);
  var lw=Math.max(xE-xS,0.05);
  var bW=Math.max(lw,nw,0.8);
  var cx=xS+bW/2;

  var angle=assign(xS,xS+bW);
  var py=Math.sin(angle)*R_FIXED;
  var pz=Math.cos(angle)*R_FIXED;

  var tex=makeTex(name,hex,bW,BH);

  // Материалы:
  // индексы BoxGeometry: 0=+X 1=-X 2=+Y 3=-Y 4=+Z 5=-Z
  // rotation.x=-angle → локальный +Z смотрит наружу от оси
  // → грань 4 (+Z) и 5 (-Z) несут текстуру (DoubleSide не нужен —
  //   грань 4 = внешняя, грань 5 = внутренняя; обе с текстурой)
  var sm=new THREE.MeshPhongMaterial({
    color:col,emissive:col,emissiveIntensity:0.14,
    transparent:true,opacity:0.65
  });
  var fm=new THREE.MeshPhongMaterial({
    map:tex,color:col,emissive:col,emissiveIntensity:0.06,
    transparent:false,opacity:1.0
  });

  var mesh=new THREE.Mesh(
    new THREE.BoxGeometry(bW,BH,BD),
    [sm,sm,sm,sm,fm,fm]
  );

  // position и rotation — ТОЛЬКО здесь, НИКОГДА в loop
  mesh.position.set(cx,py,pz);
  mesh.rotation.x=-angle;
  mesh.userData={name:name,fullname:fullname,born:born,died:died,cat:cat,desc:desc,hex:hex,
                 baseSideEI:0.14,baseFaceEI:0.06,
                 baseAngle:angle,currentAngle:angle,targetAngle:angle};
  drum.add(mesh);
  allMeshes.push(mesh);
});

console.log('bars:',allMeshes.length);

var drumKick=0, DAUTO=0.0014, drumTouched=false;
var isDrag=false,dX0=0,dY0=0,dMode=null;
var cAtD=0,drAtD=0,pdY=0,pdT=0,vY=0;
var paused=false,spIdx=2;
var SPS=[0.5,1,2,4,8,20];
function spd(){return SPS[spIdx]*3.5;}

function upPB(){
  var b=document.getElementById('bp');
  b.textContent=paused?'▶ Пуск':'⏸ Пауза';
  b.classList.toggle('on',paused);
}
function pauseOnAction(){if(!paused){paused=true;upPB();}}

canvas.addEventListener('mousedown',function(e){
  isDrag=true;dX0=e.clientX;dY0=e.clientY;
  dMode=null;cAtD=camX;drAtD=drum.rotation.x;
  pdY=e.clientY;pdT=performance.now();vY=0;
  drumTouched=true;
  pauseOnAction();
  e.preventDefault();
});
window.addEventListener('mouseup',function(){
  if(dMode==='drum')drumKick=vY*0.018;
  isDrag=false;dMode=null;
});
window.addEventListener('mousemove',function(e){
  if(!isDrag)return;
  var dx=e.clientX-dX0,dy=e.clientY-dY0;
  if(!dMode&&(Math.abs(dx)>4||Math.abs(dy)>4))
    dMode=Math.abs(dx)>Math.abs(dy)*1.2?'time':'drum';
  if(dMode==='drum'){
    var n=performance.now();
    vY=(e.clientY-pdY)/Math.max(n-pdT,1)*16;
    pdY=e.clientY;pdT=n;
    drum.rotation.x=drAtD+dy*0.014;
  }else if(dMode==='time'){
    camX=Math.max(camXmn,Math.min(camXmx,cAtD-dx*0.18));
  }
});
canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  pauseOnAction();
  if(e.shiftKey){drum.rotation.x+=e.deltaY*0.005;drumKick=0;drumTouched=true;}
  else camX=Math.max(camXmn,Math.min(camXmx,camX+e.deltaY*0.06));
},{passive:false});

var tx0=0,ty0=0,tcX=0,tdR=0,tMd=null,tpY=0,tpT=0,tVY=0;
canvas.addEventListener('touchstart',function(e){
  tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;
  tcX=camX;tdR=drum.rotation.x;tMd=null;tpY=ty0;tpT=performance.now();tVY=0;
  drumTouched=true;
  pauseOnAction();
});
canvas.addEventListener('touchmove',function(e){
  var dx=e.touches[0].clientX-tx0,dy=e.touches[0].clientY-ty0;
  if(!tMd&&(Math.abs(dx)>4||Math.abs(dy)>4))
    tMd=Math.abs(dx)>Math.abs(dy)*1.2?'time':'drum';
  if(tMd==='drum'){var n=performance.now();
    tVY=(e.touches[0].clientY-tpY)/Math.max(n-tpT,1)*16;
    tpY=e.touches[0].clientY;tpT=n;drum.rotation.x=tdR+dy*0.014;}
  else if(tMd==='time')camX=Math.max(camXmn,Math.min(camXmx,tcX-dx*0.22));
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',function(){if(tMd==='drum')drumKick=tVY*0.018;tMd=null;});

var keys={};
window.addEventListener('keydown',function(e){
  keys[e.code]=true;

  if(e.code==='ArrowLeft'||e.code==='KeyA'||e.code==='ArrowRight'||e.code==='KeyD'){pauseOnAction();}
});

// ── Двойной поиск с подсветкой ─────────────────────────────────────────────
// sel1, sel2 — выбранные имена в полях 1 и 2
// Логика: если sel1 или sel2 — подсвечиваем нужные, блёкнут остальные
// Если оба пустые — все нормальные
// ═══ 5 полей поиска + группировка на барабане ═══════════════════════════════
var NSLOTS = 10;
var selNames = [null, null, null, null, null, null, null, null, null, null]; // выбранные имена

// Цвета подсветки для каждого слота
var SLOT_COLORS = [
  new THREE.Color(1.0, 0.85, 0.2),   // золото
  new THREE.Color(0.3, 0.8, 1.0),    // голубой
  new THREE.Color(0.4, 1.0, 0.4),    // зелёный
  new THREE.Color(1.0, 0.4, 0.4),    // красный
  new THREE.Color(0.9, 0.4, 1.0),    // фиолетовый
  new THREE.Color(1.0, 0.6, 0.2),    // оранжевый
  new THREE.Color(0.2, 1.0, 0.9),    // бирюзовый
  new THREE.Color(1.0, 0.4, 0.75),   // розовый
  new THREE.Color(0.7, 1.0, 0.2),    // жёлто-зелёный
  new THREE.Color(0.6, 0.6, 1.0),    // лавандовый
];

// Каждая плашка имеет targetAngle и currentAngle для плавной анимации
// mesh.userData.baseAngle — исходный угол из assign()
// mesh.userData.currentAngle — текущий отображаемый угол
// Инициализируем после создания плашек (см. ниже init call)

function getSelectedMeshes(){
  var result = [];
  selNames.forEach(function(nm, slot){
    if(!nm) return;
    var m = allMeshes.find(function(m){ return m.userData.name===nm; });
    if(m) result.push({mesh:m, slot:slot, name:nm});
  });
  return result;
}

// Группируем выбранные плашки в секторе вокруг angle=0 (фронт барабана)
// Остальные плашки возвращаются на baseAngle
var _animRunning = false;
function regroup(){_animRunning=true;
  var sel = getSelectedMeshes();
  var n = sel.length;

  if(n === 0){
    // Вернуть всё на место
    allMeshes.forEach(function(m){
      m.userData.targetAngle = m.userData.baseAngle;
    });
    return;
  }

  // Вычисляем угловые позиции для выбранных: кластер у 0 рад
  // Шаг между плашками — ANG_STEP, кластер центрирован на 0
  var ANG_STEP_VAL = parseFloat(ANG_STEP.toFixed(6));
  var groupAngles = [];
  for(var i=0; i<n; i++){
    // Центрируем группу: offset от центра
    var offset = (i - (n-1)/2) * ANG_STEP_VAL * 2.5;
    groupAngles.push(offset);
  }

  // Назначаем выбранные плашки в группу
  sel.forEach(function(item, gi){
    item.mesh.userData.targetAngle = groupAngles[gi];
  });

  // Все остальные — возвращаем на baseAngle, но смещаем чтобы не перекрываться с группой
  // Сектор занятый группой: от groupAngles[0]-delta до groupAngles[n-1]+delta
  var groupMin = groupAngles[0] - ANG_STEP_VAL;
  var groupMax = groupAngles[n-1] + ANG_STEP_VAL;

  allMeshes.forEach(function(m){
    var nm = m.userData.name;
    var isSelected = selNames.indexOf(nm) >= 0;
    if(isSelected) return;

    var ba = m.userData.baseAngle;
    // Нормализуем в [-π, π]
    while(ba >  Math.PI) ba -= 2*Math.PI;
    while(ba < -Math.PI) ba += 2*Math.PI;

    // Если baseAngle попадает в занятый сектор — сдвигаем чуть дальше
    if(ba >= groupMin && ba <= groupMax){
      // Сдвигаем в сторону ближайшего края
      var toMin = Math.abs(ba - groupMin);
      var toMax = Math.abs(ba - groupMax);
      ba = toMin < toMax ? groupMin - ANG_STEP_VAL*0.5 : groupMax + ANG_STEP_VAL*0.5;
    }
    m.userData.targetAngle = ba;
  });
}

// Плавная анимация углов — вызывается из loop()
function animateAngles(dt){
  if(!_animRunning) return;
  var SPEED = 3.0; // скорость интерполяции (rad/s коэф)
  var needsUpdate = false;
  _animRunning = false;
  allMeshes.forEach(function(m){
    var cur = m.userData.currentAngle;
    var tgt = m.userData.targetAngle;
    if(Math.abs(tgt - cur) < 0.0002){
      if(cur !== tgt){ m.userData.currentAngle = tgt; needsUpdate=true; }
      return;
    }
    needsUpdate = true; _animRunning = true;
    var diff = tgt - cur;
    // Кратчайший путь по окружности
    while(diff >  Math.PI) diff -= 2*Math.PI;
    while(diff < -Math.PI) diff += 2*Math.PI;
    var step = diff * Math.min(SPEED * dt, 1.0);
    m.userData.currentAngle = cur + step;
  });
  if(needsUpdate){
    allMeshes.forEach(function(m){
      var a = m.userData.currentAngle;
      m.position.y = Math.sin(a) * R_FIXED;
      m.position.z = Math.cos(a) * R_FIXED;
      m.rotation.x = -a;
    });
  }
}

function applyHighlight(){
  var sel = getSelectedMeshes();
  var hasAny = sel.length > 0;
  allMeshes.forEach(function(m){
    var nm = m.userData.name;
    var slotIdx = selNames.indexOf(nm);
    var isSelected = slotIdx >= 0;
    if(!hasAny){
      m.material.forEach(function(mat,i){
        mat.opacity = (i<4)?0.65:1.0;
        mat.emissiveIntensity = (i<4)?0.14:0.06;
        mat.transparent = (i<4);
      });
    } else if(isSelected){
      var col = SLOT_COLORS[slotIdx];
      m.material.forEach(function(mat,i){
        mat.opacity = 1.0;
        mat.emissiveIntensity = (i<4)?0.55:0.8;
        mat.transparent = false;
        mat.emissive.copy(col);
      });
    } else {
      m.material.forEach(function(mat){
        mat.opacity = 0.10;
        mat.emissiveIntensity = 0.01;
        mat.transparent = true;
      });
    }
    m.material.forEach(function(mat){ mat.needsUpdate=true; });
  });
}

function makeSearchBox(inputId, listId, clearId, slot){
  var inp=document.getElementById(inputId);
  var lst=document.getElementById(listId);
  var clr=document.getElementById(clearId);

  function setSlot(name){
    selNames[slot]=name;
    applyHighlight();
    regroup();
    clr.classList.toggle('on',!!name);
    inp.classList.toggle('active',!!name);
    // Цвет поля = цвет слота при выборе
    if(name){
      var c=SLOT_COLORS[slot];
      inp.style.borderColor='rgba('+Math.round(c.r*255)+','+Math.round(c.g*255)+','+Math.round(c.b*255)+',.7)';
      inp.style.boxShadow='0 0 6px rgba('+Math.round(c.r*255)+','+Math.round(c.g*255)+','+Math.round(c.b*255)+',.25)';
    } else {
      inp.style.borderColor='';
      inp.style.boxShadow='';
    }
  }

  inp.oninput=function(){
    var q=inp.value.trim().toLowerCase();
    lst.innerHTML='';
    if(q.length<1){lst.classList.remove('op');return;}
    var found=PEOPLE.filter(function(p){
      return p[0].toLowerCase().indexOf(q)>=0||
             (p[5]&&p[5].toLowerCase().indexOf(q)>=0);
    }).slice(0,10);
    if(!found.length){lst.classList.remove('op');return;}
    found.forEach(function(p){
      var d=document.createElement('div');d.className='sr';
      var bs=p[1]<0?(-p[1]+' до н.э.'):String(p[1]);
      var ds=p[2]<0?(-p[2]+' до н.э.'):String(p[2]);
      d.innerHTML='<b>'+p[0]+'</b><small>'+bs+'–'+ds+'</small>';
      d.onclick=function(){
        inp.value=p[0]; lst.classList.remove('op');
        setSlot(p[0]);
        var m=allMeshes.find(function(m){return m.userData.name===p[0];});
        if(m){camX=m.position.x;pauseOnAction();}
      };
      lst.appendChild(d);
    });
    lst.classList.add('op');
  };

  clr.onclick=function(){inp.value='';lst.classList.remove('op');setSlot(null);};
  inp.addEventListener('keydown',function(e){
    if(e.key==='Escape'){inp.value='';lst.classList.remove('op');setSlot(null);}
  });
}

// ── Кольца-прицелы при hover ─────────────────────────────────────────────
// LineLoop — тонкая линия окружности радиуса R_FIXED, в плоскости YZ
// Прилегает вплотную к торцу плашки (не снаружи, а по радиусу плашки)
var ringBorn = null, ringDied = null, ringOpacity = 0, ringTargetOp = 0;
var RING_SEGS = 96; // сегментов окружности

function makeRingLine(){
  var pts = [];
  for(var i = 0; i <= RING_SEGS; i++){
    var a = (i / RING_SEGS) * Math.PI * 2;
    pts.push(new THREE.Vector3(0, Math.sin(a) * R_FIXED, Math.cos(a) * R_FIXED));
  }
  var geo = new THREE.BufferGeometry().setFromPoints(pts);
  var mat = new THREE.LineBasicMaterial({
    color: 0x888888,
    transparent: true,
    opacity: 0,
    depthTest: false,
    depthWrite: false,
    linewidth: 1
  });
  var line = new THREE.Line(geo, mat);
  line.renderOrder = 10;
  scene.add(line);
  return line;
}

ringBorn = makeRingLine();
ringDied = makeRingLine();

function showRings(mesh){
  if(!mesh){ ringTargetOp = 0; return; }
  var ud = mesh.userData;
  // Левый торец плашки = xS = x4y(born), правый = xS+bW
  // Ставим кольца вплотную к торцам: born и died
  ringBorn.position.x = x4y(Math.max(ud.born, YMN));
  ringDied.position.x = x4y(Math.min(ud.died, YMX));
  ringTargetOp = 1;
}

function updateRings(dt){
  var speed = 8.0;
  var diff = ringTargetOp - ringOpacity;
  ringOpacity += diff * Math.min(speed * dt, 1.0);
  ringOpacity = Math.max(0, Math.min(1, ringOpacity));
  var op = ringOpacity;
  ringBorn.material.opacity = op * 0.45;
  ringDied.material.opacity = op * 0.45;
  ringBorn.visible = (op > 0.003);
  ringDied.visible = (op > 0.003);
}

// тултип
var RC=new THREE.Raycaster(),MV=new THREE.Vector2();
var tipEl=document.getElementById('tip'),hov=null;
var _mouseX=0,_mouseY=0,_rcFrame=0;
window.addEventListener('mousemove',function(e){_mouseX=e.clientX;_mouseY=e.clientY;});
canvas.addEventListener('mouseleave',function(){if(hov){hov.material[4].emissiveIntensity=hov.userData.baseFaceEI;hov.material[0].emissiveIntensity=hov.userData.baseSideEI;hov.material[0].opacity=0.65;hov=null;tipEl.classList.remove('on');}showRings(null);});
function doRaycast(){
  var e={clientX:_mouseX,clientY:_mouseY};
  MV.x=(_mouseX/W())*2-1; MV.y=-(_mouseY/H())*2+1;
  RC.setFromCamera(MV,camera);
  var vis=allMeshes.filter(function(m){return m.visible;});
  var hits=RC.intersectObjects(vis);
  if(hov&&hov!==(hits[0]&&hits[0].object)){
    hov.material[4].emissiveIntensity=hov.userData.baseFaceEI;
    hov.material[0].emissiveIntensity=hov.userData.baseSideEI;
    hov.material[0].opacity=0.65;
    hov=null;tipEl.classList.remove('on');showRings(null);
  }
  if(hits.length){
    var m=hits[0].object;
    if(m!==hov){
      hov=m;showRings(m);
      m.material[4].emissiveIntensity=0.7;
      m.material[0].emissiveIntensity=0.5;
      m.material[0].opacity=1.0;
      var ud=m.userData;
      document.getElementById('tn').textContent=ud.fullname||ud.name;
      var bs=ud.born<0?(-ud.born+' до н.э.'):(ud.born+' н.э.');
      var ds=ud.died<0?(-ud.died+' до н.э.'):(ud.died+' н.э.');
      document.getElementById('ty').textContent=bs+' — '+ds+'  ('+(ud.died-ud.born)+' лет)';
      document.getElementById('tc').style.color=ud.hex;
      document.getElementById('tc').textContent=CATS[ud.cat].n;
      document.getElementById('td').textContent=ud.desc;
      tipEl.classList.add('on');
    }
    var tx=e.clientX+16,ty2=e.clientY-10;
    tipEl.style.left=tx+'px';tipEl.style.top=ty2+'px';
    var tr=tipEl.getBoundingClientRect();
    if(tr.right>window.innerWidth-10)tipEl.style.left=(e.clientX-tr.width-16)+'px';
    if(tr.bottom>window.innerHeight-10)tipEl.style.top=(_mouseY-tr.height)+'px';
  }
}

// скроллбар
function bldTk(){
  var ct=document.getElementById('tk');ct.innerHTML='';
  for(var y=-4000;y<=2000;y+=500){
    var pc=(y-YMN)/YSP*100,mj=(y%500===0)||y===0;
    var el=document.createElement('div');el.className='tk'+(mj?' mj':'');
    el.style.left=pc+'%';
    el.textContent=y===0?'0':(y<0?'-'+(-y):String(y));
    ct.appendChild(el);
  }
}
function upTh(){
  var p=Math.max(0,Math.min(1,(camX-camXmn)/(camXmx-camXmn)));
  var tr=document.getElementById('st'),th=document.getElementById('sh');
  var tw=Math.max(14,tr.offsetWidth*0.035);
  th.style.width=tw+'px';th.style.left=(p*(tr.offsetWidth-tw))+'px';
}
(function(){
  var th=document.getElementById('sh'),tr=document.getElementById('st');
  var dr=false,x0=0,c0=0;
  th.addEventListener('mousedown',function(e){dr=true;x0=e.clientX;c0=camX;pauseOnAction();e.preventDefault();});
  window.addEventListener('mouseup',function(){dr=false;});
  window.addEventListener('mousemove',function(e){
    if(!dr)return;
    camX=Math.max(camXmn,Math.min(camXmx,c0+(e.clientX-x0)/(tr.offsetWidth-th.offsetWidth)*(camXmx-camXmn)));
  });
  tr.addEventListener('click',function(e){
    pauseOnAction();
    var r=tr.getBoundingClientRect();
    camX=camXmn+(e.clientX-r.left)/r.width*(camXmx-camXmn);
  });
})();

function onRes(){
  renderer.setSize(W(),H());
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
  bldTk();upTh();
}
window.addEventListener('resize',onRes);
onRes();

// ---------- Render loop ----------
var clk=new THREE.Clock(),aT=0,smX=camX,_lastCamX=-9999;

function loop(){
  requestAnimationFrame(loop);
  var dt=Math.min(clk.getDelta(),0.1);
  aT+=dt;

  if(!paused)camX+=spd()*dt;
  if(keys['ArrowRight']||keys['KeyD'])camX+=spd()*2.5*dt;
  if(keys['ArrowLeft']||keys['KeyA'])camX-=spd()*2.5*dt;
  camX=Math.max(camXmn,Math.min(camXmx,camX));
  if(camX>=camXmx&&!paused){paused=true;upPB();}

  var lk=(keys['ArrowRight']||keys['ArrowLeft']||keys['KeyD']||keys['KeyA'])?0.3:0.07;
  smX+=(camX-smX)*lk;

  // Вращение барабана — ТОЛЬКО drum.rotation.x, НЕ трогаем дочерние объекты
  if(!isDrag){
    if(!drumTouched) drum.rotation.x+=DAUTO*dt;
    drum.rotation.x+=drumKick*dt;
    drumKick*=0.88;
    if(Math.abs(drumKick)<0.0002)drumKick=0;
  }

  setCamera(smX);

  // Обновляем matrixWorld барабана ВРУЧНУЮ (без рекурсии — не ломаем Sprite.position)
  drum.matrix.makeRotationX(drum.rotation.x);
  drum.matrixWorld.copy(drum.matrix);

  animateAngles(dt);
  updateRings(dt);
  _rcFrame++; if(_rcFrame%3===0) doRaycast();
  if(hov)hov.material[4].emissiveIntensity=0.48+0.25*Math.sin(aT*5);


  var yr=Math.round(smX/SC+YMN);
  document.getElementById('yr').textContent=
    yr<0?(-yr+' до н.э.'):(yr===0?'0 н.э.':yr+' н.э.');
  if(Math.abs(camX-_lastCamX)>0.01){upTh();_lastCamX=camX;}

  renderer.render(scene,camera);
}
loop();
}

initDrum();
